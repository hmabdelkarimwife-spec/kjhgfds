<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Social Live</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 حط بيانات Firebase بتاعتك هنا
const firebaseConfig = {
  apiKey: "*****",
  authDomain: "*****",
  projectId: "*****",
  storageBucket: "*****",
  messagingSenderId: "*****",
  appId: "*****"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addPost = async function() {
    let text = document.getElementById("postInput").value.trim();
    if(!text) return;
    await addDoc(collection(db,"posts"),{
        text:text,
        likes:0,
        comments:[],
        time:Date.now()
    });
    document.getElementById("postInput").value="";
}

window.addComment = async function(postId,input){
    let text = input.value.trim();
    if(!text) return;
    const postRef = doc(db,"posts",postId);
    // احنا هنا هنجيب الكومنتس الحالية ونضيف الكومنت الجديد
    onSnapshot(postRef,snap=>{});
    const snap = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(f=>f.getDoc(postRef));
    let oldComments = snap.data()?.comments || [];
    await updateDoc(postRef,{comments:[...oldComments,text]});
    input.value="";
}

window.likePost = async function(postId,likes){
    const postRef = doc(db,"posts",postId);
    await updateDoc(postRef,{likes:likes+1});
}

// Live Render
const postsContainer = document.getElementById("posts");
const postsCol = collection(db,"posts");
onSnapshot(postsCol, snapshot=>{
    postsContainer.innerHTML="";
    snapshot.docs.sort((a,b)=>b.data().time - a.data().time).forEach(docu=>{
        let p = docu.data();
        postsContainer.innerHTML+=`
        <div class="post">
            <div>${p.text}</div>
            <div class="actions">
                <button onclick="likePost('${docu.id}',${p.likes})">❤️ ${p.likes}</button>
            </div>
            <input type="text" placeholder="اكتب تعليق..." onkeypress="if(event.key==='Enter'){addComment('${docu.id}', this)}">
            <div>${(p.comments||[]).map(c=>`<div class="comment">${c}</div>`).join("")}</div>
        </div>
        `;
    });
});
</script>

<style>
body { font-family: Arial; direction: rtl; background:#f0f2f5; margin:0; }
header { background:#1877f2; color:white; padding:15px; text-align:center;}
.container { max-width:500px; margin:auto; padding:10px; }
.box { background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
textarea,input { width:100%; padding:8px; margin-top:5px; border-radius:8px; border:1px solid #ccc;}
button { margin-top:8px; padding:8px; border-radius:8px; border:none; cursor:pointer; background:#1877f2; color:white; width:100%;}
.post, .comment { background:white; padding:10px; border-radius:10px; margin-bottom:10px;}
.comment { background:#f0f2f5; margin-left:10px; font-size:13px;}
.actions { display:flex; justify-content:space-between; margin-top:5px;}
</style>
</head>
<body>
<header>Mini Social Live</header>
<div class="container">
<div class="box">
<textarea id="postInput" rows="2" placeholder="اكتب بوست..."></textarea>
<button onclick="addPost()">نشر</button>
</div>
<div id="posts"></div>
</div>
</body>
</html>
